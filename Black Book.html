<script>
  // Apply saved theme before first paint to avoid a flash of the wrong mode.
  // Tokens are set directly as inline custom properties on <html> — this is
  // the most robust way to guarantee every descendant re-resolves immediately,
  // rather than relying solely on a [data-theme] attribute-selector cascade
  // (which was observed to leave some elements with stale computed values).
  (function () {
    var THEME_TOKENS = {
      dark: {
        '--bg-primary': '#0C0B09', '--bg-card': '#17140F', '--bg-elevated': '#221D16', '--bg-hover': '#1C1810',
        '--accent-glow': '#DCBE6E', '--silver-dim': '#A39A87',
        '--text-primary': '#F3EFE6', '--text-secondary': '#A79E8E', '--text-tertiary': '#6E6656',
        '--heat-warm': '#4CA672', '--heat-cooling': '#C9A84C', '--heat-cold': '#C2665F', '--heat-dormant': '#8C8168',
        '--border-subtle': '#2A241B',
        '--shadow-card': '0 1px 0 rgba(255,255,255,0.02) inset, 0 8px 26px rgba(0,0,0,0.42)',
        '--shadow-glow': '0 0 0 1px rgba(201,168,76,0.22), 0 6px 22px rgba(201,168,76,0.07)',
      },
      light: {
        '--bg-primary': '#F3EEE2', '--bg-card': '#FFFFFF', '--bg-elevated': '#FDFBF6', '--bg-hover': '#ECE5D4',
        '--accent-glow': '#8B6A22', '--silver-dim': '#7A7362',
        '--text-primary': '#241F17', '--text-secondary': '#6B6353', '--text-tertiary': '#948C7A',
        '--heat-warm': '#2F7850', '--heat-cooling': '#96721F', '--heat-cold': '#A8483F', '--heat-dormant': '#6B6248',
        '--border-subtle': '#E4DCC8',
        '--shadow-card': '0 1px 0 rgba(255,255,255,0.6) inset, 0 6px 20px rgba(60,50,30,0.10)',
        '--shadow-glow': '0 0 0 1px rgba(201,168,76,0.3), 0 4px 16px rgba(201,168,76,0.12)',
      },
    };
    window.__BB_THEME_TOKENS__ = THEME_TOKENS;
    try {
      var t = localStorage.getItem('bb-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
      var vars = THEME_TOKENS[t] || THEME_TOKENS.dark;
      for (var k in vars) document.documentElement.style.setProperty(k, vars[k]);
    } catch (e) {}
  })();
</script>
